                  - code [ref=e115]: StreamEvent
                  - text: s through a
                  - code [ref=e116]: MessageStream
                  - text: . You iterate it with
                  - code [ref=e117]: async for
                  - text: . No callback registries, no separate handler types for text vs. tools.
                - listitem [ref=e118]:
                  - strong [ref=e119]: Append-only checkpointing.
                  - text: Persistence writes the new messages on each turn, not the full transcript. O(1) DB I/O regardless of conversation length — SQLite for laptops, Postgres for production.
                - listitem [ref=e120]:
