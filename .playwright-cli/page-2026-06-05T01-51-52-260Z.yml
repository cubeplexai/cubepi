              - heading "CubePi" [level=1] [ref=e88]
              - paragraph [ref=e89]:
                - strong [ref=e90]: CubePi
                - text: 是一个 Pythonic、原生异步的 Agent 框架，为高性能、可读性和 生产级持久化而设计。它把一次 Agent 运行建模为一个线性的
                - code [ref=e91]: while
                - text: 循环——可追踪、可调试，没有 DAG、没有图 DSL、没有出人意料的控制流。 整个核心循环你五分钟就能读完。
              - generic [ref=e93]:
                - code [ref=e95]:
                  - generic [ref=e96]: pip install cubepi
                - button "复制代码到剪贴板" [ref=e98] [cursor=pointer]:
                  - generic [ref=e99]:
                    - img [ref=e100]
                    - img [ref=e102]
              - paragraph [ref=e104]:
                - text: 然后跳到
                - link "快速开始" [ref=e105] [cursor=pointer]:
                  - /url: /zh-Hans/docs/getting-started/quick-start
                - text: ，五分钟内跑通一个 能调用工具的 Agent。
              - heading "你能拿到什么你能拿到什么的直接链接" [level=2] [ref=e106]:
                - text: 你能拿到什么
                - link "你能拿到什么的直接链接" [ref=e107] [cursor=pointer]:
                  - /url: "#你能拿到什么"
                  - text: "#"
              - list [ref=e108]:
                - listitem [ref=e109]:
                  - strong [ref=e110]: 普通 async 函数，不是图节点。
                  - text: Agent 循环就是一个对消息轮次的
                  - code [ref=e111]: while
                  - text: 循环。你把工具写成
                  - code [ref=e112]: async def
                  - text: 函数，框架负责路由调用并并行 执行。
                - listitem [ref=e113]:
                  - strong [ref=e114]: 统一的流式模式。
                  - text: 所有 provider 都通过
                  - code [ref=e115]: MessageStream
                  - text: 产出
                  - code [ref=e116]: StreamEvent
                  - text: 。你用
                  - code [ref=e117]: async for
                  - text: 迭代它。没有 callback 注册表，也没有 为文本和工具单独的 handler 类型。
                - listitem [ref=e118]:
                  - strong [ref=e119]: 追加式检查点。
                  - text: 每一轮只写入新消息，而不是整段对话历史。无论 会话多长，数据库 I/O 都是 O(1)——SQLite 适合个人开发,Postgres 适合 生产环境。
                - listitem [ref=e120]:
                  - strong [ref=e121]: 原生多 provider。
                  - text: Anthropic 和 OpenAI 开箱即用,通过
                  - code [ref=e122]: Provider
                  - text: Protocol 接入。要新增一个 provider 只需要写一个类。
                - listitem [ref=e123]:
                  - strong [ref=e124]: 八个 Hook 的中间件。
                  - code [ref=e125]: transform_context
                  - text: 、
                  - code [ref=e126]: convert_to_llm
                  - text: 、
                  - code [ref=e127]: transform_system_prompt
                  - text: 、
                  - code [ref=e128]: before_tool_call
                  - text: 、
                  - code [ref=e129]: after_tool_call
                  - text: 、
                  - code [ref=e130]: should_stop_after_turn
                  - text: 、
                  - code [ref=e131]: after_model_response
                  - text: 、
                  - code [ref=e132]: on_run_end
                  - text: —— 每一个都有明确的组合规则。没有"节点执行顺序之谜"。
                - listitem [ref=e133]:
                  - strong [ref=e134]: MCP 加载器。
                  - text: 指向任意
                  - link "Model Context Protocol" [ref=e135] [cursor=pointer]:
                    - /url: https://modelcontextprotocol.io
                  - text: 服务器 （HTTP 或 stdio),就能拿回一组
                  - code [ref=e136]: AgentTool
                  - text: 。
                - listitem [ref=e137]:
                  - strong [ref=e138]: 原生 OpenTelemetry。
                  - text: 挂一个
                  - code [ref=e139]: Tracer
                  - text: ",每次 prompt 就产生符合 GenAI 语义约定的 OTel span 树 —— Jaeger、Tempo、Honeycomb、 Datadog 等任意 OTLP 后端都能直接接收。默认不记录任何 payload； 需要时用"
                  - code [ref=e140]: record_content=True
                  - text: 配合
                  - code [ref=e141]: redact
                  - text: 回调显式开启。
                - listitem [ref=e142]:
                  - strong [ref=e143]: 人机协同（HITL）。
                  - text: 在 run 中途挂起 Agent，把决策路由给人工 （审批 / 拒绝 / 回答），然后继续执行 —— 支持检查点持久化， 等待期间进程可以重启。
